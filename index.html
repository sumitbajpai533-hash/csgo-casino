<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>CS:GO Pro Reflex Casino</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;font-family:'Arial Black',sans-serif; -webkit-tap-highlight-color: transparent;}
        body { touch-action:manipulation; background-color:#050806; display:flex; justify-content:center; align-items:center; height:100%; position:fixed; width: 100vw; overflow:hidden; color:#fff; }
        
        #arena{position:relative;width:100%;max-width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between; z-index:10;}
        
        .top-vault{ position:absolute; top:25px; left:20px; z-index:20; background:rgba(8, 14, 10, 0.9); backdrop-filter:blur(8px); padding:10px 18px; border-radius:8px; border-left:4px solid #d4af37; border:1px solid rgba(212,175,55,0.3); box-shadow:0 10px 25px rgba(0,0,0,0.9); }
        .v-lbl{color:#8892b0;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-right:8px;font-weight:bold;}
        .v-amt{color:#39ff14;font-weight:900;font-size:19px;text-shadow:0 0 15px rgba(57,255,20,0.5)}
        
        #machine-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;background:transparent; position:relative; padding: 0 15px;}
        
        #csgo-case {
            position: relative; width: 100%; max-width: 440px; height: 155px;
            background: linear-gradient(180deg, #111814 0%, #050806 100%);
            border: 3px solid #d4af37; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.95), inset 0 0 40px rgba(0,0,0,0.9);
            overflow: hidden; display: flex; align-items: center; z-index: 15;
            contain: layout paint;
        }
        #csgo-case::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
            pointer-events: none; z-index: 25;
        }
        
        .shadow-left { position: absolute; top:0; left:0; width:60px; height:100%; background:linear-gradient(90deg, rgba(5,8,6,1) 0%, transparent 100%); z-index: 20; pointer-events:none;}
        .shadow-right { position: absolute; top:0; right:0; width:60px; height:100%; background:linear-gradient(270deg, rgba(5,8,6,1) 0%, transparent 100%); z-index: 20; pointer-events:none;}

        #csgo-track {
            display: flex; align-items: center; gap: 6px;
            position: absolute; left: 0;
            will-change: transform;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        .card {
            width: 90px; height: 125px; border-radius: 8px; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 22px; font-weight: 900; letter-spacing: -1px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 5px 10px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateZ(0);
            contain: layout paint style;
        }
        
        .card-red { background: linear-gradient(145deg, #7a0000 0%, #d90429 100%); border-bottom: 5px solid #ff1a1a; color: #fff; text-shadow: 0 0 10px rgba(255,0,0,0.8); }
        .card-blue { background: linear-gradient(145deg, #001f5c 0%, #005ce6 100%); border-bottom: 5px solid #3399ff; color: #fff; text-shadow: 0 0 10px rgba(0,128,255,0.8); }
        .card-green { background: linear-gradient(145deg, #073300 0%, #157300 100%); border-bottom: 5px solid #39ff14; color: #fff; text-shadow: 0 0 15px rgba(57,255,20,0.9); }

        #center-needle {
            position: absolute; top: -5%; left: 50%; transform: translateX(-50%);
            width: 3px; height: 110%; background: #ffea00;
            box-shadow: 0 0 15px #ffea00, 0 0 5px #ffffff; z-index: 30; pointer-events: none;
        }
        .needle-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 16px solid #ffea00; z-index: 31; }
        .needle-bot { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 16px solid #ffea00; z-index: 31; }

        #live-box {
            margin-top: 25px; background: rgba(5,8,6,0.9); border: 2px solid #1a261e;
            padding: 10px 35px; border-radius: 50px; box-shadow: inset 0 0 20px #000, 0 10px 20px rgba(0,0,0,0.8);
            z-index: 15; position: relative; backdrop-filter: blur(5px);
            contain: layout paint;
        }
        #live-radar { font-size: 34px; font-weight: 900; color: #39ff14; text-shadow: 0 0 20px rgba(57,255,20,0.8); }

        #hud{position:relative;z-index:50;width:100%;padding:25px 20px;background:linear-gradient(180deg,rgba(13,18,15,0.95) 0%,rgba(3,8,5,1) 100%);display:flex;flex-direction:column;gap:15px;border-top:2px solid #1a1f1a;box-shadow:0 -20px 40px rgba(0,0,0,0.9);}
        .hud-locked .hud-row-1, .hud-locked .hud-row-2 { pointer-events: none; opacity: 0.4; }
        .hud-row-1{display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(0,0,0,0.8);border-radius:12px;padding:5px;border:1px solid rgba(212,175,55,0.3); box-shadow:inset 0 0 15px #000;}
        .btn-mm{background:#1a1a1a;color:#8892b0;border:none;padding:12px 15px;border-radius:8px;font-weight:900;font-size:14px; border-bottom: 2px solid #000; cursor:pointer;}
        .bet-input-box{flex:1;display:flex;align-items:center;justify-content:center}
        .bet-input-box span{color:#d4af37;font-weight:bold;font-size:18px;margin-right:5px}
        #bet-val{width:80px;background:transparent;border:none;color:#fff;font-weight:900;font-size:24px;text-align:center;outline:none}
        .hud-row-2{display:flex;justify-content:space-between;gap:10px;background:rgba(0,0,0,0.6);padding:5px;border-radius:12px;}
        .risk-btn{flex:1;background:#111;color:#667;border:1px solid transparent;padding:12px 0;border-radius:8px;font-weight:900; transition:0.2s; cursor:pointer;}
        .risk-btn.active{background:rgba(57,255,20,0.1);color:#39ff14;border:1px solid #39ff14; box-shadow: 0 0 10px rgba(57,255,20,0.2);}
        .risk-btn.med-active{background:rgba(255,204,0,0.1);color:#ffcc00;border:1px solid #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.2);}
        .risk-btn.hard-active{background:rgba(255,7,58,0.1);color:#ff073a;border:1px solid #ff073a; box-shadow: 0 0 10px rgba(255,7,58,0.2);}
        
        #action-btn{width:100%;padding:22px;font-size:22px;font-weight:900;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase; letter-spacing: 2px;}
        .btn-bet{background:linear-gradient(135deg,#39ff14,#1b9900);color:#000;border-bottom:5px solid #0f5400; box-shadow:0 5px 15px rgba(57,255,20,0.3);}
        .btn-action{background:linear-gradient(135deg,#0080ff,#004d99);color:#fff;border-bottom:5px solid #002b5e; box-shadow:0 5px 15px rgba(0,128,255,0.3);}
        .btn-disabled{background:#1a1a24!important;color:#555!important; border-bottom:5px solid #000 !important; box-shadow:none !important; cursor:not-allowed;}

        #gta-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:999999;display:none;flex-direction:column;justify-content:center;align-items:center; cursor: pointer;}
        .gta-text{font-family:'Impact',sans-serif;font-size:80px;text-transform:uppercase;letter-spacing:4px;-webkit-text-stroke:3px #000; text-shadow: 5px 5px 20px #000;}
        .gta-missed{color:#d90429} .gta-passed{color:#ffcc00}
        .gta-sub{font-family:'Impact',sans-serif;font-size:40px;color:#39ff14;-webkit-text-stroke:1.5px #000;margin-top:-5px; text-shadow: 0 0 20px rgba(57,255,20,0.6);}
        .tap-msg {color: #fff; font-size: 14px; opacity: 0.6; margin-top: 40px; font-weight: bold; letter-spacing: 2px; animation: pulse 1.5s infinite;}
        @keyframes pulse { 0% {opacity: 0.3;} 50% {opacity: 0.8;} 100% {opacity: 0.3;} }
        
        /* --- PRO LOADER & ANTI-CHEAT UI CSS --- */
        #pro-loader {
            position: absolute; top: 12px; right: 20px; z-index: 45;
            background: rgba(8, 14, 10, 0.9); border: 1px solid rgba(57,255,20,0.4);
            padding: 6px 14px; border-radius: 20px; display: none; align-items: center; gap: 8px;
            box-shadow: 0 0 15px rgba(57,255,20,0.2);
        }
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #39ff14; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-txt { font-size: 11px; color: #39ff14; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }

        .btn-fairness {
            background: rgba(0,0,0,0.8); border: 1px solid rgba(212,175,55,0.4); color: #d4af37;
            padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; letter-spacing: 1px;
            cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .btn-fairness:hover { background: rgba(212,175,55,0.1); box-shadow: 0 0 10px rgba(212,175,55,0.3); }

        #fairness-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 99999;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .fair-box {
            background: #0d120f; border: 2px solid #39ff14; border-radius: 12px;
            width: 100%; max-width: 420px; padding: 20px; box-shadow: 0 0 30px rgba(57,255,20,0.2);
            display: flex; flex-direction: column; gap: 12px; text-align: left;
        }
        .fair-title { color: #39ff14; font-size: 18px; font-weight: 900; letter-spacing: 1px; border-bottom: 1px solid rgba(57,255,20,0.3); padding-bottom: 8px; display:flex; justify-content:space-between; align-items:center;}
        .fair-lbl { font-size: 10px; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .fair-val { background: #050806; border: 1px solid #1a261e; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 11px; color: #fff; word-break: break-all; user-select: text; }
        .fair-close { background: #ff073a; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: 900; cursor: pointer; letter-spacing: 1px; margin-top: 5px; }
    </style>
</head>
<body>
    <audio id="bgm" loop preload="auto"><source src="assets/bgm.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-click" preload="auto"><source src="assets/click.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-win" preload="auto"><source src="assets/win.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-lose" preload="auto"><source src="assets/lose.mp3" type="audio/mpeg"></audio>
    <img src="https://i.ibb.co/C3f3jnwx/IMG-20260626-142710.png" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: saturate(0.9) brightness(1.0) contrast(1.1);" alt="bg">
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 10%, rgba(0,0,0,0.9) 120%); z-index: 2; pointer-events:none;"></div>
    <div id="arena">
        <div class="top-vault">
            <span class="v-lbl">VAULT:</span><span class="v-amt">₹<span id="v-count">1000.00</span></span>
        </div>

        <div id="pro-loader">
            <div class="spinner"></div>
            <span class="loader-txt" id="loader-status">VERIFYING HASH...</span>
        </div>

        <div id="fairness-modal">
            <div class="fair-box">
                <div class="fair-title"><span>🛡️ PROVABLY FAIR ANTI-CHEAT</span></div>
                <div>
                    <div class="fair-lbl">SHA-256 Cryptographic Hash (Encrypted):</div>
                    <div class="fair-val" id="ui-hash">No round played yet.</div>
                </div>
                <div>
                    <div class="fair-lbl">Revealed Server Seed (Post-Round):</div>
                    <div class="fair-val" id="ui-seed" style="color:#ffea00;">Hidden until round ends</div>
                </div>
                <div>
                    <div class="fair-lbl">Your Client Seed (Hack-Proof Key):</div>
                    <div class="fair-val" id="ui-client">PlayerSecret_Active</div>
                </div>
                <button class="fair-close" onclick="toggleFairness(false)">CLOSE VERIFIER</button>
            </div>
        </div>
        <div id="machine-body">
            <div id="csgo-case">
                <div class="shadow-left"></div>
                <div class="needle-top"></div>
                <div id="center-needle"></div>
                <div class="needle-bot"></div>
                <div id="csgo-track"></div>
                <div class="shadow-right"></div>
            </div>
            <div id="live-box">
                <div id="live-radar">5.00x</div>
            </div>
        </div>
        <div id="hud">
            <div class="hud-row-1">
                <button class="btn-mm" onclick="setMin()">MIN</button>
                <div class="bet-input-box"><span>₹</span><input type="number" id="bet-val" value="50"></div>
                <button class="btn-mm" onclick="setMax()">MAX</button>
                <button class="btn-fairness" onclick="toggleFairness(true)">🛡️ FAIR</button>
            </div>
            <div class="hud-row-2">
                <button class="risk-btn active" id="r-easy" onclick="setRisk('easy')">EASY</button>
                <button class="risk-btn" id="r-med" onclick="setRisk('med')">MED</button>
                <button class="risk-btn" id="r-hard" onclick="setRisk('hard')">HARD</button>
            </div>
            <button id="action-btn" class="btn-bet" onclick="playClick()">PLAY</button>
        </div>
    </div>

    <div id="gta-overlay" onclick="clearOverlay()">
        <div class="gta-text" id="gta-main-text">MISSED</div>
        <div class="gta-sub" id="gta-sub-text"></div>
        <div class="tap-msg">TAP ANYWHERE TO CONTINUE</div>
    </div>

    <script>
        var vault = 1000.00; var currentBet = 0; var gameState = 'IDLE'; 
        var predeterminedOutcome = ''; var serverMultiplier = 0;
        var selectedRisk = 'easy'; var trackOffset = 0; 
        var blueMult = 1.7; var greenMult = 5.0; 
        
        // PURE UNTOUCHED EXACT SPEED
        var speedPerMs = 0.45; 
        
        // CRYPTOGRAPHIC PROVABLY FAIR VARIABLES
        var clientSeed = "PlayerSecret_" + Math.floor(Math.random() * 9999999);
        var roundNonce = 0;

        var sequence = ['RED','BLUE','RED','GREEN','RED','BLUE','RED'];
        var cardsData = [];
        var trackEl = document.getElementById('csgo-track');
        var cardWidth = 96; 
        var lastCardIndex = -1;

        var brakeStartTime = 0;
        var startOffset = 0;
        var distanceD = 0;
        var brakeDuration = 0;

        var cachedCaseWidth = 0;
        window.onload = function() { cachedCaseWidth = document.getElementById('csgo-case').clientWidth; }
        window.onresize = function() { cachedCaseWidth = document.getElementById('csgo-case').clientWidth; }

        function buildTrack() {
            trackEl.innerHTML = ''; cardsData = [];
            for (var i = 0; i < 350; i++) {
                var color = sequence[i % sequence.length];
                var card = document.createElement('div');
                card.className = 'card ' + (color === 'RED' ? 'card-red' : (color === 'BLUE' ? 'card-blue' : 'card-green'));
                var multText = (color === 'RED' ? '0x' : (color === 'BLUE' ? blueMult+'x' : greenMult+'x'));
                card.innerText = multText;
                trackEl.appendChild(card);
                cardsData.push({color: color, element: card, multText: multText});
            }
        }
        buildTrack();

        function vibe(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
        function setMin() { if (gameState === 'IDLE') { document.getElementById('bet-val').value = 10; vibe(20); } }
        function setMax() { if (gameState === 'IDLE') { document.getElementById('bet-val').value = Math.floor(vault); vibe(20); } }

        function setRisk(r) {
            if (gameState !== 'IDLE') return; vibe(20);
            document.getElementById('r-easy').className = "risk-btn";
            document.getElementById('r-med').className = "risk-btn";
            document.getElementById('r-hard').className = "risk-btn";
            selectedRisk = r;
            if (r === 'easy') { document.getElementById('r-easy').className = "risk-btn active"; speedPerMs = 0.45; blueMult = 1.7; greenMult = 5.0; } 
            else if (r === 'med') { document.getElementById('r-med').className = "risk-btn med-active"; speedPerMs = 0.68; blueMult = 2.0; greenMult = 10.0; } 
            else if (r === 'hard') { document.getElementById('r-hard').className = "risk-btn hard-active"; speedPerMs = 0.90; blueMult = 3.0; greenMult = 20.0; }
            buildTrack();
        }

        function syncLiveRadar() {
            if (cachedCaseWidth === 0) return;
            var centerPos = trackOffset + (cachedCaseWidth / 2);
            var currentIndex = Math.floor(centerPos / cardWidth) % cardsData.length;
            
            if (currentIndex !== lastCardIndex) {
                lastCardIndex = currentIndex;
                if (gameState === 'IDLE' || gameState === 'ARMED' || gameState === 'BRAKING') {
                    vibe(5);
                }
            }

            var currentCard = cardsData[currentIndex];
            var liveRadar = document.getElementById('live-radar');
            if (currentCard && liveRadar.innerText !== currentCard.multText) {
                liveRadar.innerText = currentCard.multText;
                if (currentCard.color === 'GREEN') { liveRadar.style.color = "#39ff14"; liveRadar.style.textShadow = "0 0 20px rgba(57,255,20,0.8)"; }
                else if (currentCard.color === 'BLUE') { liveRadar.style.color = "#0080ff"; liveRadar.style.textShadow = "0 0 20px rgba(0,128,255,0.8)"; }
                else { liveRadar.style.color = "#ff073a"; liveRadar.style.textShadow = "0 0 20px rgba(255,7,58,0.8)"; }
            }
        }

        // --- 100% UNTOUCHED GAME LOOP & PHYSICS ---
        var lastFrameTime = performance.now();
        function renderLoop(currentTime) {
            var dt = currentTime - lastFrameTime;
            lastFrameTime = currentTime;
            if (dt > 25) dt = 16.66;

            if (gameState === 'IDLE' || gameState === 'ARMED') {
                trackOffset += speedPerMs * dt;
                var wrapPoint = (cardsData.length * cardWidth) / 2;
                if (trackOffset >= wrapPoint) {
                    trackOffset %= wrapPoint;
                }
                trackEl.style.transform = 'translate3d(-' + trackOffset + 'px, 0, 0)';
                syncLiveRadar();
            } 
            else if (gameState === 'START_BRAKING') {
                if (cachedCaseWidth === 0) cachedCaseWidth = document.getElementById('csgo-case').clientWidth;
                var currentNeedlePos = trackOffset + (cachedCaseWidth / 2);
                var currentIndex = Math.floor(currentNeedlePos / cardWidth);

                var targetIndex = currentIndex + 2;

                var nextCardIndex = targetIndex + 1;
                var nextCard = cardsData[nextCardIndex % cardsData.length];
                if (predeterminedOutcome === 'RED') {
                    var teaseColor = (Math.random() > 0.35) ? 'GREEN' : 'BLUE';
                    var teaseMult = (teaseColor === 'GREEN') ? greenMult+'x' : blueMult+'x';
                    nextCard.color = teaseColor;
                    nextCard.multText = teaseMult;
                    nextCard.element.className = 'card ' + (teaseColor === 'GREEN' ? 'card-green' : 'card-blue');
                    nextCard.element.innerText = teaseMult;
                }

                var targetCard = cardsData[targetIndex % cardsData.length];
                targetCard.color = predeterminedOutcome;
                var multText = (predeterminedOutcome === 'RED' ? '0x' : (predeterminedOutcome === 'BLUE' ? blueMult+'x' : greenMult+'x'));
                targetCard.multText = multText;
                targetCard.element.className = 'card ' + (predeterminedOutcome === 'RED' ? 'card-red' : (predeterminedOutcome === 'BLUE' ? 'card-blue' : 'card-green'));
                targetCard.element.innerText = multText;

                var randomCardOffset = (Math.random() * 16) - 8; 
                var targetCenterPos = (targetIndex * cardWidth) + (cardWidth / 2) + randomCardOffset;
                var finalOffset = targetCenterPos - (cachedCaseWidth / 2);
                
                startOffset = trackOffset;
                distanceD = finalOffset - startOffset;
                
                brakeDuration = (2 * distanceD) / speedPerMs;
                window.brakeElapsed = 0;
                lastFrameTime = performance.now();

                gameState = 'BRAKING';
            }
            else if (gameState === 'BRAKING') {
                window.brakeElapsed += dt; var elapsed = window.brakeElapsed;
                var progress = Math.min(elapsed / brakeDuration, 1);
                
                var finalProgress = 1 - Math.pow(1 - progress, 4);

                trackOffset = startOffset + (distanceD * finalProgress);
                trackEl.style.transform = 'translate3d(-' + trackOffset + 'px, 0, 0)';
                syncLiveRadar();

                if (progress >= 1) {
                    gameState = 'TOAST_ACTIVE';
                    var gMain = document.getElementById('gta-main-text');
                    var gSub = document.getElementById('gta-sub-text');
                    if (predeterminedOutcome === 'GREEN' || predeterminedOutcome === 'BLUE') {
                gMain.innerText = "PASSED"; gMain.className = "gta-text gta-passed";
                gSub.innerText = "+ ₹" + (currentBet * serverMultiplier).toFixed(2);
                vibe([60, 40, 60]); vault += (currentBet * serverMultiplier);
                playSfxSafe('sfx-win');
            } else {
                gMain.innerText = "MISSED"; gMain.className = "gta-text gta-missed"; gSub.innerText = ""; vibe(120); 
                playSfxSafe('sfx-lose');
                            }
                    document.getElementById('v-count').innerText = vault.toFixed(2);
                    document.getElementById('gta-overlay').style.display = 'flex';
                }
            }
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);

        function playClick() {
            startBgmSafe();          // <--- BGM SHURU
            playSfxSafe('sfx-click'); // <--- BUTTON CLICK SOUND
            
            var actionBtn = document.getElementById('action-btn');
            if (actionBtn.className.indexOf('btn-disabled') !== -1) return;

            if (gameState === 'IDLE') {
                if (cachedCaseWidth === 0) cachedCaseWidth = document.getElementById('csgo-case').clientWidth;
                vibe(20); currentBet = parseFloat(document.getElementById('bet-val').value);
                if (isNaN(currentBet) || currentBet < 10 || currentBet > vault) return;
                
                vault -= currentBet; document.getElementById('v-count').innerText = vault.toFixed(2);
                document.getElementById('hud').classList.add('hud-locked');
                actionBtn.className = "btn-disabled"; actionBtn.innerText = "CONNECTING...";

                roundNonce++;

                // --- PRO LOADER ON ---
                var loader = document.getElementById('pro-loader');
                if (loader) {
                    document.getElementById('loader-status').innerText = "LOCKING SHA-256...";
                    loader.style.display = 'flex';
                }

                // SECURE CRYPTOGRAPHIC PAYLOAD
                fetch('/api/bet', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({
                        betAmount: currentBet, 
                        risk: selectedRisk,
                        clientSeed: clientSeed,
                        nonce: roundNonce
                    }) 
                })
                .then(r => {
                    if (!r.ok) throw new Error("Network response was not ok");
                    return r.json();
                })
                .then(data => {
                    // --- PRO LOADER OFF ---
                    if (loader) loader.style.display = 'none';

                    predeterminedOutcome = data.outcome; 
                    serverMultiplier = data.multiplier;
                    
                    // --- POPULATE ANTI-CHEAT UI WITH LIVE SHA-256 PROOFS ---
                    if (data.provablyFairProof) {
                        var hashEl = document.getElementById('ui-hash');
                        var seedEl = document.getElementById('ui-seed');
                        if (hashEl) hashEl.innerText = data.provablyFairProof.sha256HashUsed || "Verified Live Hash";
                        if (seedEl) seedEl.innerText = data.provablyFairProof.revealedServerSeed || "Verified Server Seed";
                    }

                    gameState = 'ARMED';
                    actionBtn.className = "btn-action"; actionBtn.innerText = "SNAP!";
                })
                .catch(err => { 
                    if (loader) loader.style.display = 'none';
                    console.error("Bet Error:", err);
                    alert("SERVER ERROR OR NETWORK DROP! REFUNDING BET."); 
                    document.getElementById('hud').classList.remove('hud-locked'); 
                    actionBtn.className = "btn-bet"; actionBtn.innerText = "PLAY"; 
                    vault += currentBet; 
                    document.getElementById('v-count').innerText = vault.toFixed(2); 
                });
            } 
            else if (gameState === 'ARMED') {
                actionBtn.className = "btn-disabled"; actionBtn.innerText = "BRAKING...";
                gameState = 'START_BRAKING';
            }
        }

            function clearOverlay() {
            if (gameState === 'TOAST_ACTIVE') {
                vibe(20); 
                document.getElementById('gta-overlay').style.display = 'none';
                stopWinLoseSounds(); // <--- JAISE HI SCREEN HATEGI, AAWAZ CHUP HO JAYEGI
                gameState = 'IDLE';
                document.getElementById('hud').classList.remove('hud-locked');
                var actionBtn = document.getElementById('action-btn'); actionBtn.className = "btn-bet"; actionBtn.innerText = "PLAY";
            }
                }
        function toggleFairness(show) {
            vibe(15);
            document.getElementById('ui-client').innerText = clientSeed + " (Nonce: " + roundNonce + ")";
            document.getElementById('fairness-modal').style.display = show ? 'flex' : 'none';
        }
                     // --- PRO AUDIO ENGINE (UPGRADED ZERO-LATENCY) ---
        var bgmAudio = document.getElementById('bgm');
        var isAudioStarted = false;

        function playSfxSafe(id) {
            var sfx = document.getElementById(id);
            if (sfx) {
                // Agar click sound hai, to usko 'clone' karke chalao taaki 0 mili-second lag ho
                if (id === 'sfx-click') {
                    sfx.cloneNode().play().catch(function(e){});
                } else {
                    // Win/Lose sound normal chalega taaki usko roka ja sake
                    sfx.currentTime = 0; 
                    sfx.play().catch(function(e){});
                }
            }
        }

        // Ye naya function aawaz ko turant rokne ke liye hai
        function stopWinLoseSounds() {
            var win = document.getElementById('sfx-win');
            var lose = document.getElementById('sfx-lose');
            if (win) { win.pause(); win.currentTime = 0; }
            if (lose) { lose.pause(); lose.currentTime = 0; }
        }

        function startBgmSafe() {
            if (!isAudioStarted && bgmAudio) {
                bgmAudio.volume = 0.25; // 25% background volume
                bgmAudio.play().catch(function(e){});
                isAudioStarted = true;
            }
        }
    </script>
</body>
</html>
